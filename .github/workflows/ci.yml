name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔹 Backend dependencies
    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    # 🔹 Fail-safe test step
    - name: Run backend tests
      run: |
        cd backend
        npm test || exit 1

    # 🔹 Build backend image
    - name: Build backend image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:latest ./backend

    # 🔹 Build frontend image
    - name: Build frontend image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest ./frontend

    # 🔹 Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 Push backend image
    - name: Push backend image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:latest

    # 🔹 Push frontend image
    - name: Push frontend image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest